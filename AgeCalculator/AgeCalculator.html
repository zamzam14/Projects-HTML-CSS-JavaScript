  <div class="content">
    <h4>Age Calculator</h4>
    <label>Name</label>
    <input type="text" id="userName">

    <p id="askName"></p>

    <p>Choose how to get today’s date:</p>

      <button onclick="Manual()" id="manualBtn">Manual Calculation</button>

      <div id="dateSection" style="display:none;">
        <label>Choose the day you want:</label>
        <input type="date" id="birthDate">
      </div>

      <button onclick="automatic()" id="autoBtn">Automatic Calculation</button> 
      <p id="Xautomatic"></p>
    </div>

    <label>Select your birthday:</label>
    <input type="date" id="askYourDate">
    <p id="yourDate"></p>

    <p id="yourAge"></p>
  </div>
